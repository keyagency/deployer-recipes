name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Extract changelog section for this version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            /^## \[/ { if (found) exit }
            found { print }
          ' CHANGELOG.md | sed -e '/./,$!d' > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No changelog section found for $VERSION" >&2
            exit 1
          fi

      - name: Delete existing release for this tag, if any
        run: |
          gh api "repos/$GITHUB_REPOSITORY/releases" --jq ".[] | select(.tag_name == \"$GITHUB_REF_NAME\") | .id" \
            | while read -r id; do gh api -X DELETE "repos/$GITHUB_REPOSITORY/releases/$id"; done
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}

      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md
        env:
          # RELEASE_TOKEN is a personal access token, so the release is authored
          # by that account instead of github-actions.
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
